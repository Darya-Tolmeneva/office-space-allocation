# Create the secret manually on the cluster:
#
#   kubectl create secret generic app-secrets \
#     --namespace=<NAMESPACE> \
#     --from-literal=POSTGRES_DB=office_space_allocation \
#     --from-literal=POSTGRES_USER=postgres \
#     --from-literal=POSTGRES_PASSWORD=<YOUR_PASSWORD> \
#     --from-literal=POSTGRES_DSN='postgres://postgres:<YOUR_PASSWORD>@postgres:5432/office_space_allocation?sslmode=disable' \
#     --from-literal=JWT_SIGNING_KEY=<YOUR_RANDOM_SECRET_KEY>
#
# Required env vars:
#   POSTGRES_DB              — database name
#   POSTGRES_USER            — database user
#   POSTGRES_PASSWORD        — database password
#   POSTGRES_DSN             — full connection string for the backend
#   JWT_SIGNING_KEY          — secret key for JWT token signing (must NOT be "change-me")
#
# Optional env vars (set in configmap or secret):
#   HTTP_ADDRESS             — server listen address (default :8080)
#   ALLOWED_ORIGINS          — comma-separated CORS origins
#   POSTGRES_MAX_OPEN_CONNS  — max open DB connections (default 10)
#   POSTGRES_MAX_IDLE_CONNS  — max idle DB connections (default 5)
