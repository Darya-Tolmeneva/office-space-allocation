apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape the FlowDesk backend /metrics endpoint
      - job_name: "flowdesk-backend"
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          # Only scrape endpoints from the "backend" service
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: backend
          # Only scrape endpoints in the flowdesk-* namespaces
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: flowdesk-.*
          # Set the metrics path
          - target_label: __metrics_path__
            replacement: /metrics
          # Add namespace label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Add pod label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Add service label
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service

      # Scrape Prometheus itself
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
