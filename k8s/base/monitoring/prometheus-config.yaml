apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape the FlowDesk backend in test namespace
      - job_name: "flowdesk-backend"
        metrics_path: /metrics
        static_configs:
          - targets:
              - "backend.flowdesk-test.svc.cluster.local:8080"
            labels:
              namespace: flowdesk-test
          - targets:
              - "backend.flowdesk-prod.svc.cluster.local:8080"
            labels:
              namespace: flowdesk-prod

      # Scrape node-exporter for VM hardware metrics
      # node-exporter uses hostNetwork, so we target the k8s node IP
      # On single-node k3s, the node internal IP is reachable from any pod
      - job_name: "node-exporter"
        static_configs:
          - targets: ["node-exporter.monitoring.svc.cluster.local:9100"]

      # Scrape Prometheus itself
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
