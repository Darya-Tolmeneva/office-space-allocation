apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flowdesk-prod

resources:
  - namespace.yaml
  - ../../base

patches:
  - path: patches-backend.yaml
  - path: patches-frontend.yaml
  - path: ingress-patch.yaml

images:
  - name: office-space-allocation/backend
    newTag: prod
  - name: office-space-allocation/frontend
    newTag: prod
