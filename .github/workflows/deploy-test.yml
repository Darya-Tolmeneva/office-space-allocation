name: Deploy Test

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          envs: POSTGRES_PASSWORD,JWT_SIGNING_KEY,POSTGRES_DB,POSTGRES_USER
          script: |
            set -euo pipefail

            PROJECT_DIR="$HOME/office-space-allocation"

            # Clone or update the repository
            if [ -d "$PROJECT_DIR/.git" ]; then
              echo "=== Updating existing repository ==="
              cd "$PROJECT_DIR"
              git fetch origin
              git reset --hard origin/${{ github.ref_name }}
            else
              echo "=== Cloning repository ==="
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            fi

            # Run deploy script — env vars are passed from GitHub Secrets
            echo "=== Running deploy.sh test ==="
            sudo -E bash scripts/deploy.sh test
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
