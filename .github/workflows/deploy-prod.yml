name: Deploy Prod

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          debug: true
          envs: POSTGRES_PASSWORD,JWT_SIGNING_KEY,POSTGRES_DB,POSTGRES_USER
          script: |
            set -euo pipefail

            PROJECT_DIR="$HOME/office-space-allocation"

            # Clone or update the repository
            if [ -d "$PROJECT_DIR/.git" ]; then
              echo "=== Updating existing repository ==="
              cd "$PROJECT_DIR"
              git fetch origin main
              git reset --hard origin/main
            elif [ -d "$PROJECT_DIR" ]; then
              echo "=== Directory exists but is not a git repo, re-creating ==="
              rm -rf "$PROJECT_DIR"
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            else
              echo "=== Cloning repository ==="
              git clone https://github.com/${{ github.repository }}.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            fi

            # Run deploy script — env vars are passed from GitHub Secrets
            echo "=== Running deploy.sh prod ==="
            sudo -E bash scripts/deploy.sh prod
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
